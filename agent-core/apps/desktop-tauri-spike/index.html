<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hermes PTY Spike</title>
  <style>
    :root {
      --bg: #0b1220;
      --surface: #111a2e;
      --border: #243049;
      --fg: #e2e8f0;
      --muted: #94a3b8;
      --accent: #0d9488;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg); font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    #app { display: flex; flex-direction: column; height: 100vh; }
    #toolbar { height: 48px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; }
    #toolbar button { background: var(--accent); color: #fff; border: 0; border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; }
    #toolbar button:disabled { opacity: 0.5; cursor: not-allowed; }
    #toolbar #status { font-size: 13px; color: var(--muted); margin-left: auto; }
    #terminal-host { flex: 1; min-height: 0; padding: 12px; }
    #terminal { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <button id="start" type="button">Start shell</button>
      <button id="close" type="button" disabled>Close shell</button>
      <span id="status">no session</span>
    </div>
    <div id="terminal-host">
      <div id="terminal"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
